<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Einloggen — Riedel Classics</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RC Login">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #0d0f14;
    --surface:   #141820;
    --surface2:  #1c2230;
    --border:    #252d3d;
    --accent:    #3b82f6;
    --accent2:   #1d4ed8;
    --green:     #22c55e;
    --yellow:    #f59e0b;
    --red:       #ef4444;
    --text:      #e8eaf0;
    --muted:     #6b7a99;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 14px;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .topbar {
    display: flex; align-items: center; justify-content: center;
    padding: 0 24px; height: 56px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
  .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .logo span { color: var(--muted); font-weight: 400; margin-left: 4px; font-size: 13px; }

  .main { max-width: 480px; margin: 0 auto; padding: 20px; }

  .clock { text-align: center; font-family: var(--mono); font-size: 15px; color: var(--muted); margin-bottom: 20px; }
  .usage-hint { text-align: center; font-size: 13px; color: var(--accent); background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25); border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; }

  .recognized-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; text-align: center; margin-top: 20px; }
  .recognized-avatar { width: 64px; height: 64px; border-radius: 50%; background: rgba(59,130,246,0.15); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; margin: 0 auto 16px; }
  .recognized-name { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .recognized-abt { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .recognized-status { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .recognized-status.anwesend { color: var(--green); font-weight: 600; }
  .recognized-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--accent); color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
  .recognized-btn.gehen { background: var(--yellow); color: #1a1400; }
  .recognized-btn-neutral { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .recognized-hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
  .device-reset-link { margin-top: 18px; font-size: 12px; color: var(--muted); text-decoration: underline; cursor: pointer; }

  .search-box {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 14px 16px; font-size: 16px; margin-bottom: 16px; font-family: var(--sans);
  }

  .ma-grid { display: flex; flex-direction: column; gap: 8px; }
  .ma-tile {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; cursor: pointer;
  }
  .ma-tile:active { background: var(--surface2); }
  .ma-tile.anwesend { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }

  .ma-avatar {
    width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; background: rgba(59,130,246,0.15); color: var(--accent); flex-shrink: 0;
  }
  .ma-tile.anwesend .ma-avatar { background: rgba(34,197,94,0.15); color: var(--green); }

  .ma-info { flex: 1; min-width: 0; }
  .ma-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .ma-abt { font-size: 12px; color: var(--muted); }

  .ma-status { font-size: 11px; font-weight: 600; text-align: right; flex-shrink: 0; }
  .ma-status.out { color: var(--muted); }
  .ma-status.in { color: var(--green); }
  .ma-since { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

  .empty-hint { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }

  /* CONFIRM OVERLAY */
  .overlay {
    position: fixed; inset: 0; background: rgba(13,15,20,0.92); backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; z-index: 999; padding: 24px;
  }
  .overlay.show { display: flex; }
  .confirm-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 32px 28px; max-width: 340px; width: 100%; text-align: center;
  }
  .confirm-icon { font-size: 48px; margin-bottom: 12px; }
  .confirm-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .confirm-sub { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .confirm-time { font-family: var(--mono); font-size: 24px; margin: 16px 0; color: var(--accent); }
  .confirm-card.gehen .confirm-time { color: var(--yellow); }
  .confirm-close { margin-top: 8px; padding: 10px 24px; border-radius: 10px; border: none; background: var(--surface2); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; }
  .confirm-yes { margin-top: 8px; margin-left: 10px; padding: 10px 24px; border-radius: 10px; border: none; background: var(--accent); color: white; font-size: 13px; font-weight: 600; cursor: pointer; }
  .confirm-card.gehen .confirm-yes { background: var(--yellow); color: #1a1400; }
  .confirm-card.ask .confirm-title { color: var(--text); }
  .confirm-hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin: 10px 0 4px; }

  /* QR-GATE SPERRBILDSCHIRM */
  .qrgate { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 998; padding: 24px; }
  .qrgate.show { display: flex; }
  .qrgate-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 28px; max-width: 340px; width: 100%; text-align: center; }
  .qrgate-icon { font-size: 48px; margin-bottom: 14px; }
  .qrgate-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .qrgate-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="qrgate" id="qrgate">
  <div class="qrgate-card">
    <div class="qrgate-icon">📷</div>
    <div class="qrgate-title">QR-Code scannen</div>
    <div class="qrgate-sub">Bitte den Zugangs-Code am Werkstatt-Eingang scannen, um dich einzuloggen.</div>
  </div>
</div>

<div class="topbar">
  <div class="logo"><div class="logo-icon">🔐</div> RC Login <span>Zeiterfassung</span></div>
</div>

<div class="main">
  <div class="clock" id="clock">--:--:--</div>

  <div id="recognizedView" style="display:none">
    <div class="recognized-card">
      <div class="recognized-avatar" id="recAvatar">?</div>
      <div class="recognized-name" id="recName">–</div>
      <div class="recognized-abt" id="recAbt">–</div>
      <div class="recognized-status" id="recStatus">–</div>
      <button class="recognized-btn" id="recBtn" onclick="tapOwnCard()">–</button>
      <div class="recognized-hint" id="recHint" style="display:none"></div>
      <button class="recognized-btn recognized-btn-neutral" id="recCloseBtn" style="display:none" onclick="attemptClose()">Fertig</button>
      <div class="device-reset-link" onclick="resetDeviceIdentity()">Nicht du? Anderen Namen wählen</div>
    </div>
  </div>

  <div id="listView">
    <div class="usage-hint" id="usageHint">👉 Tippe deinen Namen an, um dich einzuchecken oder auszuchecken.</div>
    <input type="text" class="search-box" id="searchBox" placeholder="Name suchen…" oninput="renderList()">
    <div class="ma-grid" id="maGrid"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="confirm-card" id="confirmCard">
    <div class="confirm-icon" id="confirmIcon">✅</div>
    <div class="confirm-title" id="confirmTitle">Eingecheckt</div>
    <div class="confirm-sub" id="confirmSub"></div>
    <div class="confirm-time" id="confirmTime"></div>
    <div id="confirmActions"><button class="confirm-close" onclick="closeOverlay()">Schließen</button></div>
  </div>
</div>

<script>
var SUPABASE_URL = "https://ysqzdqazcgyuzdorauiq.supabase.co";
var SUPABASE_ANON_KEY = "sb_publishable_v4kXJa0y-2EHsCFPqBFHfg_QvzKLnt2";

var STATE = { abteilungen: [], mitarbeiter: [], offeneEintraege: {}, mode: null };
var DEVICE_MA_KEY = "sg_my_ma_id"; // localStorage: persistiert auf DIESEM Geraet, ueberlebt App-Neustart

function sbHeaders(extra) {
  var h = { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + SUPABASE_ANON_KEY, "Content-Type": "application/json", "Cache-Control": "no-cache, no-store, must-revalidate", "Pragma": "no-cache" };
  if (extra) for (var k in extra) h[k] = extra[k];
  return h;
}

function showQrGate(msg) {
  document.getElementById('qrgate').className = 'qrgate show';
  if (msg) document.querySelector('.qrgate-sub').textContent = msg;
  document.querySelector('.main').style.display = 'none';
}
function hideQrGate() {
  document.getElementById('qrgate').className = 'qrgate';
  document.querySelector('.main').style.display = '';
}

// Jede Aktion braucht einen frischen, richtungsspezifischen Scan -- kein Merken der Sitzung mehr.
function checkGateAccess() {
  var params = new URLSearchParams(window.location.search);
  var g = params.get('g');
  if (!g) { showQrGate(); return; }

  fetch(SUPABASE_URL + "/rest/v1/sg_settings?select=gate_token_in,gate_token_out&id=eq.1", { headers: sbHeaders(), cache: "no-store" })
    .then(function(r){ return r.json(); })
    .then(function(rows) {
      var row = rows && rows[0];
      if (row && g === row.gate_token_in) { STATE.mode = 'in'; hideQrGate(); loadAll(); }
      else if (row && g === row.gate_token_out) { STATE.mode = 'out'; hideQrGate(); loadAll(); }
      else { showQrGate('Ungültiger Code. Bitte den offiziellen QR-Code am Eingang bzw. Ausgang scannen.'); }
    })
    .catch(function(e) { console.error('Gate-Check fehlgeschlagen:', e); showQrGate(); });
}

function initials(name) {
  var parts = (name||'').trim().split(/\s+/);
  if (parts.length === 1) return parts[0].substring(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE');
}
updateClock();
setInterval(updateClock, 1000);

function loadAll() {
  Promise.all([
    fetch(SUPABASE_URL + "/rest/v1/sg_abteilungen?select=*&aktiv=eq.true", { headers: sbHeaders(), cache: "no-store" }).then(function(r){return r.json();}),
    fetch(SUPABASE_URL + "/rest/v1/sg_mitarbeiter_public?select=*&aktiv=eq.true&order=name.asc", { headers: sbHeaders(), cache: "no-store" }).then(function(r){return r.json();}),
    fetch(SUPABASE_URL + "/rest/v1/sg_zeiterfassung?select=*&gehen=is.null", { headers: sbHeaders(), cache: "no-store" }).then(function(r){return r.json();})
  ]).then(function(res) {
    STATE.abteilungen = res[0] || [];
    STATE.mitarbeiter = res[1] || [];
    STATE.offeneEintraege = {};
    (res[2] || []).forEach(function(e) { STATE.offeneEintraege[e.mitarbeiter_id] = e; });
    decideScreen();
  }).catch(function(e) {
    console.error('Ladefehler:', e);
    document.getElementById('maGrid').innerHTML = '<div class="empty-hint">Fehler beim Laden. Bitte Seite neu laden.</div>';
  });
}

function decideScreen() {
  document.getElementById('usageHint').textContent = STATE.mode === 'in'
    ? '👉 Tippe deinen Namen an, um dich einzuchecken.'
    : '👉 Tippe deinen Namen an, um dich auszuchecken.';

  var myId = localStorage.getItem(DEVICE_MA_KEY);
  var m = myId ? STATE.mitarbeiter.find(function(x){return x.id===myId;}) : null;
  if (m) { renderRecognized(m); } else { showListView(); renderList(); }
}

function showListView() {
  document.getElementById('recognizedView').style.display = 'none';
  document.getElementById('listView').style.display = '';
}

function renderRecognized(m) {
  document.getElementById('listView').style.display = 'none';
  var view = document.getElementById('recognizedView');
  view.style.display = '';

  var offen = STATE.offeneEintraege[m.id];
  document.getElementById('recAvatar').textContent = initials(m.name);
  document.getElementById('recName').textContent = m.name;
  document.getElementById('recAbt').textContent = abtName(m.abteilung_id);

  var statusEl = document.getElementById('recStatus');
  var btnEl = document.getElementById('recBtn');
  var hintEl = document.getElementById('recHint');
  var closeBtnEl = document.getElementById('recCloseBtn');

  var mismatch = (STATE.mode === 'in' && offen) || (STATE.mode === 'out' && !offen);

  if (mismatch) {
    btnEl.style.display = 'none';
    hintEl.style.display = '';
    closeBtnEl.style.display = '';
    if (STATE.mode === 'in') {
      statusEl.textContent = '● Bereits anwesend seit ' + timeSince(offen.kommen);
      statusEl.className = 'recognized-status anwesend';
      hintEl.textContent = 'Du bist schon eingecheckt — nichts zu tun. Du kannst diese Seite jetzt schließen.';
    } else {
      statusEl.textContent = 'Aktuell nicht eingecheckt';
      statusEl.className = 'recognized-status';
      hintEl.textContent = 'Es gibt nichts zum Auschecken. Du kannst diese Seite jetzt schließen.';
    }
    return;
  }

  hintEl.style.display = 'none';
  closeBtnEl.style.display = 'none';
  btnEl.style.display = '';

  if (STATE.mode === 'in') {
    statusEl.textContent = 'Aktuell nicht eingecheckt';
    statusEl.className = 'recognized-status';
    btnEl.textContent = '✅ Jetzt einchecken';
    btnEl.className = 'recognized-btn';
  } else {
    statusEl.textContent = '● Anwesend seit ' + timeSince(offen.kommen);
    statusEl.className = 'recognized-status anwesend';
    btnEl.textContent = '👋 Jetzt auschecken';
    btnEl.className = 'recognized-btn gehen';
  }
}

function attemptClose() {
  try { window.close(); } catch (e) {}
  // Falls der Browser das Schliessen verweigert (z.B. Safari bei manuell geoeffneten Tabs),
  // bleibt die Seite einfach stehen -- der Hinweistext hat es bereits erklaert.
}

function tapOwnCard() {
  var myId = localStorage.getItem(DEVICE_MA_KEY);
  var m = myId ? STATE.mitarbeiter.find(function(x){return x.id===myId;}) : null;
  if (m) showAskConfirm(m);
}

function resetDeviceIdentity() {
  if (!confirm('Dieses Gerät einem anderen Namen zuordnen?')) return;
  localStorage.removeItem(DEVICE_MA_KEY);
  showListView();
  renderList();
}

function abtName(id) {
  var a = STATE.abteilungen.find(function(x){return x.id===id;});
  return a ? a.name : '—';
}

function timeSince(iso) {
  var d = new Date(iso);
  return d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
}

function renderList() {
  var q = document.getElementById('searchBox').value.trim().toLowerCase();
  var grid = document.getElementById('maGrid');
  var list = STATE.mitarbeiter.filter(function(m) { return !q || m.name.toLowerCase().indexOf(q) !== -1; });

  if (!list.length) { grid.innerHTML = '<div class="empty-hint">Kein Treffer.</div>'; return; }

  var html = '';
  list.forEach(function(m) {
    var offen = STATE.offeneEintraege[m.id];
    html += '<div class="ma-tile' + (offen ? ' anwesend' : '') + '" onclick="handleTap(\'' + m.id + '\')">'
      + '<div class="ma-avatar">' + initials(m.name) + '</div>'
      + '<div class="ma-info"><div class="ma-name">' + m.name + '</div><div class="ma-abt">' + abtName(m.abteilung_id) + '</div></div>'
      + '<div>' + (offen
          ? '<div class="ma-status in">● Anwesend</div><div class="ma-since">seit ' + timeSince(offen.kommen) + '</div>'
          : '<div class="ma-status out">Nicht da</div>')
      + '</div></div>';
  });
  grid.innerHTML = html;
}

function handleTap(maId) {
  var m = STATE.mitarbeiter.find(function(x){return x.id===maId;});
  if (!m) return;
  var offen = STATE.offeneEintraege[maId];

  // Richtung wird durch den gescannten QR-Code bestimmt, nicht durch den aktuellen Status.
  if (STATE.mode === 'in' && offen) { alert(m.name + ' ist bereits eingecheckt (seit ' + timeSince(offen.kommen) + ').'); return; }
  if (STATE.mode === 'out' && !offen) { alert(m.name + ' ist aktuell nicht eingecheckt.'); return; }

  showAskConfirm(m);
}

function showAskConfirm(m) {
  var isEinchecken = STATE.mode === 'in';
  var card = document.getElementById('confirmCard');
  card.className = 'confirm-card ask' + (isEinchecken ? '' : ' gehen');
  document.getElementById('confirmIcon').textContent = isEinchecken ? '✅' : '👋';
  document.getElementById('confirmTitle').textContent = 'Bist du sicher?';
  document.getElementById('confirmSub').textContent = m.name + ' · ' + abtName(m.abteilung_id);
  document.getElementById('confirmTime').textContent = isEinchecken ? 'Jetzt einchecken' : 'Jetzt auschecken';
  document.getElementById('confirmActions').innerHTML =
    '<button class="confirm-close" onclick="closeOverlay()">Abbrechen</button>'
    + '<button class="confirm-yes" onclick="doBooking(\'' + m.id + '\')">Ja, ' + (isEinchecken ? 'einchecken' : 'auschecken') + '</button>';
  document.getElementById('overlay').className = 'overlay show';
}

var CHECKIN_FN_URL = "https://ysqzdqazcgyuzdorauiq.supabase.co/functions/v1/sg-checkin";

function doBooking(maId) {
  var m = STATE.mitarbeiter.find(function(x){return x.id===maId;});
  if (!m) return;

  if (STATE.mode === 'out') {
    var offen = STATE.offeneEintraege[maId];
    if (!offen) { alert('Kein offener Eintrag gefunden.'); closeOverlay(); return; }
    fetch(CHECKIN_FN_URL, {
      method: "POST", headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
      body: JSON.stringify({ action: "checkout", payload: { id: offen.id, mitarbeiter_id: maId } })
    }).then(function(r){ return r.json().then(function(d){ return { ok: r.ok, body: d }; }); })
      .then(function(res) {
        if (!res.ok || res.body.error) { alert('Fehler beim Auschecken: ' + (res.body.error || 'unbekannt')); return; }
        delete STATE.offeneEintraege[maId];
        localStorage.setItem(DEVICE_MA_KEY, maId);
        showResult(m, false);
      }).catch(function(e){ console.error(e); alert('Fehler beim Auschecken (Netzwerk).'); });
  } else {
    fetch(CHECKIN_FN_URL, {
      method: "POST", headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
      body: JSON.stringify({ action: "checkin", payload: { mitarbeiter_id: maId, abteilung_id: m.abteilung_id } })
    }).then(function(r){ return r.json().then(function(d){ return { ok: r.ok, body: d }; }); })
      .then(function(res) {
        if (!res.ok || res.body.error) { alert('Fehler beim Einchecken: ' + (res.body.error || 'unbekannt')); return; }
        if (res.body.data && res.body.data[0]) STATE.offeneEintraege[maId] = res.body.data[0];
        localStorage.setItem(DEVICE_MA_KEY, maId);
        showResult(m, true);
      }).catch(function(e){ console.error(e); alert('Fehler beim Einchecken (Netzwerk).'); });
  }
}

function showResult(m, isKommen) {
  var card = document.getElementById('confirmCard');
  card.className = 'confirm-card' + (isKommen ? '' : ' gehen');
  document.getElementById('confirmIcon').textContent = isKommen ? '✅' : '👋';
  document.getElementById('confirmTitle').textContent = isKommen ? 'Eingecheckt' : 'Ausgecheckt — schönen Feierabend!';
  document.getElementById('confirmSub').textContent = m.name + ' · ' + abtName(m.abteilung_id);
  document.getElementById('confirmTime').textContent = new Date().toLocaleTimeString('de-DE');
  var hint = isKommen ? 'Du kannst diese Seite jetzt schließen. Zum Auschecken später den QR-Code am Ausgang scannen.' : 'Du kannst diese Seite jetzt schließen.';
  document.getElementById('confirmActions').innerHTML = '<div class="confirm-hint">' + hint + '</div><button class="confirm-close" onclick="closeOverlay()">Fertig</button>';
  document.getElementById('overlay').className = 'overlay show';
}

function closeOverlay() {
  document.getElementById('overlay').className = 'overlay';
}

document.querySelector('.main').style.display = 'none';
checkGateAccess();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(e){ console.log('SW-Registrierung fehlgeschlagen:', e); });
}
</script>
</body>
</html>
